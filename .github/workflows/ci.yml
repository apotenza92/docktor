name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rename_phase: transition
            channel: stable
            product_name: Dockmint
            bundle_id: pzc.Dockter
            app_icon: AppIcon
          - rename_phase: transition
            channel: beta
            product_name: Dockmint Beta
            bundle_id: pzc.Dockter.beta
            app_icon: AppIconBeta
          - rename_phase: cleanup
            channel: stable
            product_name: Dockmint
            bundle_id: pzc.Dockmint
            app_icon: AppIcon
          - rename_phase: cleanup
            channel: beta
            product_name: Dockmint Beta
            bundle_id: pzc.Dockmint.beta
            app_icon: AppIconBeta
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Swift packages with retry
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_PACKAGES_DIR="$RUNNER_TEMP/SourcePackages-${{ matrix.rename_phase }}-${{ matrix.channel }}"
          rm -rf "$SOURCE_PACKAGES_DIR"
          mkdir -p "$SOURCE_PACKAGES_DIR"

          for attempt in 1 2 3; do
            if xcodebuild \
              -project Dockmint.xcodeproj \
              -scheme Dockmint \
              -resolvePackageDependencies \
              -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR"; then
              exit 0
            fi

            if [[ "$attempt" -eq 3 ]]; then
              echo "::error::Swift package resolution failed after $attempt attempts."
              exit 1
            fi

            sleep $((attempt * 10))
          done

      - name: Build Dockmint (${{ matrix.rename_phase }} / ${{ matrix.channel }})
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$RUNNER_TEMP/SourcePackages-${{ matrix.rename_phase }}-${{ matrix.channel }}"
          xcodebuild \
            -project Dockmint.xcodeproj \
            -scheme Dockmint \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            PRODUCT_NAME="${{ matrix.product_name }}" \
            PRODUCT_BUNDLE_IDENTIFIER="${{ matrix.bundle_id }}" \
            ASSETCATALOG_COMPILER_APPICON_NAME="${{ matrix.app_icon }}" \
            SU_FEED_URL="https://raw.githubusercontent.com/${{ matrix.rename_phase == 'transition' && 'apotenza92/docktor' || 'apotenza92/dockmint' }}/main/appcasts/${{ matrix.channel }}-arm64.xml" \
            CODE_SIGNING_ALLOWED=NO \
            build
